server {
    listen 80;
    server_name your-domain.com;

    # Limit uploads to 3000MB (3GB)
    client_max_body_size 3000M;
    
    # Increase buffer size for large payloads
    client_body_buffer_size 128k;

    # Extend timeouts for long-running streaming processes
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    # Main Application
    location / {
        proxy_pass http://127.0.0.1:5173; # Proxy to Vite/React
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API & Upload Streaming Endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:5000; # Proxy to Express
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward actual client IP for security
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
